# ============================================================
#  Shopee Comment AI – การตั้งค่าหลัก
#  ปรับไฟล์นี้ให้ตรงกับตาราง BigQuery จริงของคุณ
# ============================================================

bigquery:
  project_id: "elated-channel-468406-t4"
  dataset: "Platform"
  table: "shopee_product_comments"
  # location ของ dataset (เช่น US, asia-southeast1)
  location: "US"

# ------------------------------------------------------------
#  Mapping คอลัมน์ : ซ้าย = ชื่อมาตรฐานในระบบ, ขวา = ชื่อคอลัมน์จริงใน BigQuery
#  ** แก้ค่าฝั่งขวาให้ตรงกับ schema จริงของคุณ **
#  ถ้าคอลัมน์ไหนไม่มี ให้ใส่ null แล้วระบบจะข้ามไป
# ------------------------------------------------------------
columns:
  comment_id:   "comment_id"      # รหัสคอมเมนต์ (unique)
  brand:        "brand"           # ชื่อแบรนด์ / ร้าน
  shop_name:    "shop_name"       # ชื่อร้าน (ถ้ามี)
  product_name: "product_name"    # ชื่อสินค้า
  product_id:   "product_id"      # รหัสสินค้า
  rating:       "rating"          # ดาว 1-5
  comment_text: "comment"         # ข้อความคอมเมนต์
  username:     "username"        # ชื่อผู้รีวิว
  created_at:   "create_time"     # เวลาที่คอมเมนต์ (TIMESTAMP/DATETIME/STRING)
  order_id:     "order_id"        # รหัสออเดอร์ (ถ้ามี)

# ------------------------------------------------------------
#  เกณฑ์ความรุนแรง / ธงด่วน (urgent)
#  คอมเมนต์ที่เข้าเงื่อนไขใดเงื่อนไขหนึ่ง = ต้องรีบเทคแอ็คชั่น
# ------------------------------------------------------------
urgent_rules:
  # rating ต่ำกว่าหรือเท่ากับค่านี้ = เสี่ยง
  rating_threshold: 2
  # คะแนนความรุนแรงจาก AI (0-10) ตั้งแต่ค่านี้ขึ้นไป = ด่วน
  severity_threshold: 7
  # คำ/วลีที่ถ้าพบ ให้ยกระดับเป็นด่วนทันที (ไทย + อังกฤษ)
  red_flag_keywords:
    - "หลอกลวง"
    - "โกง"
    - "ของปลอม"
    - "ไม่ได้ของ"
    - "ไม่ส่ง"
    - "เงียบ"
    - "ติดต่อไม่ได้"
    - "แพ้"
    - "ผื่น"
    - "อันตราย"
    - "หมดอายุ"
    - "ขึ้นรา"
    - "เน่า"
    - "ฟ้องร้อง"
    - "สคบ"
    - "ทนายความ"
    - "รีฟัน"
    - "คืนเงิน"
    - "scam"
    - "fake"
    - "refund"
    - "lawyer"
    - "dangerous"
    - "expired"

# ------------------------------------------------------------
#  รายชื่อหมวดปัญหา (ให้ AI จัดประเภทตามนี้)
# ------------------------------------------------------------
issue_categories:
  - "คุณภาพสินค้า"        # ของพัง ของเสีย ไม่ตรงปก
  - "การจัดส่ง"           # ส่งช้า ส่งผิด พัสดุเสียหาย
  - "การบริการ/แอดมิน"    # ตอบช้า บริการแย่
  - "ราคา/โปรโมชั่น"      # แพง โปรไม่ตรง
  - "บรรจุภัณฑ์"          # แพ็คไม่ดี กล่องบุบ
  - "ความปลอดภัย/สุขภาพ"  # แพ้ ระคายเคือง หมดอายุ
  - "การชำระเงิน"         # จ่ายเงินมีปัญหา
  - "อื่น ๆ"
  - "เชิงบวก/ชม"          # คอมเมนต์ดี

# ------------------------------------------------------------
#  AI model (Anthropic Claude)
# ------------------------------------------------------------
ai:
  model: "claude-sonnet-4-6"
  # จำนวนคอมเมนต์ต่อ 1 request (batch) เพื่อประหยัด token
  batch_size: 15
  # ภาษา output ของ summary/insight
  output_language: "th"
  # ใช้ AI หรือไม่ (false = ใช้ rule-based อย่างเดียว ทดสอบฟรีได้)
  enabled: true

# ------------------------------------------------------------
#  pipeline
# ------------------------------------------------------------
pipeline:
  # ดึงข้อมูลย้อนหลังกี่วันต่อรอบ (รันรายวันใช้ 1)
  lookback_days: 1
  # โฟลเดอร์เก็บผลวิเคราะห์ (JSON)
  output_dir: "data"
  # จำนวนคอมเมนต์สูงสุดต่อรอบ (กันค่าใช้จ่ายพุ่ง, 0 = ไม่จำกัด)
  max_comments_per_run: 0
